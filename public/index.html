<!DOCTYPE html>
<html>
<head>
    <title>NaijaShield Sentinel AI</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- Cluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b0f19;
            color: white;
        }

        header {
            padding: 15px;
            background: #111827;
        }

        #map {
            height: 60vh;
            width: 100%;
        }

        .container {
            padding: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 15px;
            background: yellow;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 6px 0;
            border-bottom: 1px solid #333;
        }

        .risk {
            font-weight: bold;
        }

        #alertBanner {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: red;
            color: white;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 8px;
            display: none;
            z-index: 9999;
        }
    </style>
</head>

<body>

<header>
    <h2>🛡️ NaijaShield Sentinel Command Center</h2>
    <p class="risk" id="riskLevel">Loading risk...</p>
</header>

<div id="alertBanner"></div>

<div id="map"></div>

<div class="container">

    <div class="grid">

        <div>
            <h3>📍 Report Incident</h3>
            <input id="location" placeholder="Location">
            <textarea id="desc" placeholder="Describe incident"></textarea>
            <button onclick="report()">Submit Report</button>
        </div>

        <div>
            <h3>📡 Live Incidents</h3>
            <ul id="incidents"></ul>
        </div>

    </div>

    <h3>📰 Daily Reports</h3>
    <ul id="reports"></ul>

</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
let map;
let clusterGroup;
let heatLayer;

// 🗺 INIT MAP
function initMap() {
    map = L.map('map').setView([9.0820, 8.6753], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    clusterGroup = L.markerClusterGroup();
    map.addLayer(clusterGroup);
}

// 📡 LOAD INCIDENTS
async function loadIncidents() {
    try {
        const res = await fetch('/incidents');
        const data = await res.json();

        const list = document.getElementById('incidents');
        list.innerHTML = "";

        clusterGroup.clearLayers();

        let heatPoints = [];

        data.slice(-20).reverse().forEach(i => {

            const description = i.description || i.desc || "No description";

            const li = document.createElement('li');
            li.textContent = `${i.location || "Unknown"} - ${description}`;
            list.appendChild(li);

            if (i.lat && i.lng) {

                const marker = L.marker([i.lat, i.lng]);
                marker.bindPopup(`<b>${i.location}</b><br>${description}`);
                clusterGroup.addLayer(marker);

                heatPoints.push([i.lat, i.lng, 0.6]);
            }
        });

        // Refresh heatmap
        if (heatLayer) {
            map.removeLayer(heatLayer);
        }

        heatLayer = L.heatLayer(heatPoints, {
            radius: 25,
            blur: 15,
            maxZoom: 10
        }).addTo(map);

    } catch (err) {
        console.log("❌ Incident load error:", err);
    }
}

// 🧠 LOAD RISK
async function loadRisk() {
    try {
        const res = await fetch('/risk');
        const data = await res.json();

        const el = document.getElementById('riskLevel');
        el.textContent = "Risk Level: " + data.risk;

        if (data.risk === "HIGH") {
            el.style.color = "red";
            showAlert("🚨 HIGH RISK DETECTED");
        } else if (data.risk === "MEDIUM") {
            el.style.color = "orange";
        } else {
            el.style.color = "green";
        }

    } catch (err) {
        console.log("❌ Risk load error");
    }
}

// 📰 LOAD REPORTS
async function loadReports() {
    try {
        const res = await fetch('/reports');
        const data = await res.json();

        const list = document.getElementById('reports');
        list.innerHTML = "";

        data.slice(-5).reverse().forEach(r => {
            const li = document.createElement('li');
            li.textContent = `📅 ${r.date} | Total: ${r.total}`;
            list.appendChild(li);
        });

    } catch (err) {
        console.log("❌ Report load error");
    }
}

// 🚨 ALERT
function showAlert(msg) {
    const banner = document.getElementById('alertBanner');
    banner.textContent = msg;
    banner.style.display = "block";

    setTimeout(() => {
        banner.style.display = "none";
    }, 5000);
}

// 📍 REPORT INCIDENT
async function report() {
    const location = document.getElementById('location').value;
    const desc = document.getElementById('desc').value;

    if (!location || !desc) {
        alert("Fill all fields");
        return;
    }

    await fetch('/report', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ location, description: desc })
    });

    document.getElementById('location').value = "";
    document.getElementById('desc').value = "";

    loadIncidents();
}

// 🔄 AUTO REFRESH
setInterval(() => {
    loadIncidents();
    loadRisk();
    loadReports();
}, 10000);

// 🚀 START
initMap();
loadIncidents();
loadRisk();
loadReports();
</script>

</body>
</html>
