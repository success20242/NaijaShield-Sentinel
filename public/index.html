<!DOCTYPE html>
<html>
<head>
    <title>NaijaShield Sentinel AI</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- Cluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b0f19;
            color: white;
        }

        header {
            padding: 15px;
            background: #111827;
        }

        #map {
            height: 60vh;
            width: 100%;
        }

        .container {
            padding: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 15px;
            background: yellow;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 6px 0;
            border-bottom: 1px solid #333;
        }

        .risk {
            font-weight: bold;
        }

        #alertBanner {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: red;
            color: white;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 8px;
            display: none;
            z-index: 9999;
        }
    </style>
</head>

<body>

<header>
    <h2>🛡️ NaijaShield Sentinel Command Center</h2>
    <p class="risk" id="riskLevel">Loading risk...</p>
</header>

<div id="alertBanner"></div>

<div id="map"></div>

<div class="container">

    <div class="grid">

        <div>
            <h3>📍 Report Incident</h3>
            <input id="location" placeholder="Location">
            <textarea id="desc" placeholder="Describe incident"></textarea>
            <button onclick="report()">Submit Report</button>
        </div>

        <div>
            <h3>📡 Live Incidents</h3>
            <ul id="incidents"></ul>
        </div>

    </div>

    <h3>📰 Daily Reports</h3>
    <ul id="reports"></ul>

</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
let map;
let clusterGroup;
let heatLayer;

// 🔌 SOCKET CONNECTION
const socket = io("http://localhost:3000");

// 🗺 INIT MAP
function initMap() {
    map = L.map('map').setView([9.0820, 8.6753], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    clusterGroup = L.markerClusterGroup();
    map.addLayer(clusterGroup);
}

// 🚨 ALERT
function showAlert(msg) {
    const banner = document.getElementById('alertBanner');
    banner.textContent = msg;
    banner.style.display = "block";

    setTimeout(() => {
        banner.style.display = "none";
    }, 5000);
}

// 📍 REPORT INCIDENT
async function report() {
    const location = document.getElementById('location').value;
    const desc = document.getElementById('desc').value;

    if (!location || !desc) {
        alert("Fill all fields");
        return;
    }

    await fetch('/report', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ location, description: desc })
    });

    document.getElementById('location').value = "";
    document.getElementById('desc').value = "";
}

// ⚡ LIVE INCIDENT STREAM
socket.on("incident", (i) => {
    const list = document.getElementById('incidents');

    const li = document.createElement('li');
    li.textContent = `${i.location} - ${i.description}`;
    list.prepend(li);

    if (i.lat && i.lng) {
        const marker = L.marker([i.lat, i.lng]);
        marker.bindPopup(i.description);
        marker.addTo(map);
    }
});

// 🧠 LIVE RISK STREAM
socket.on("risk", (data) => {
    const el = document.getElementById('riskLevel');
    el.textContent = "Risk Level: " + data.risk;

    if (data.risk === "HIGH") {
        el.style.color = "red";
        showAlert("🚨 HIGH RISK DETECTED");
    } else if (data.risk === "MEDIUM") {
        el.style.color = "orange";
    } else {
        el.style.color = "green";
    }
});

// 📰 LIVE REPORT STREAM
socket.on("report", (r) => {
    const list = document.getElementById('reports');

    const li = document.createElement('li');
    li.textContent = `📅 ${r.date} | Total: ${r.total}`;

    list.prepend(li);
});

// 🚀 START
initMap();
</script>

</body>
</html>
