<div class="grid">

    <div>

        <textarea id="desc" placeholder="Describe incident"></textarea><br>
        <button onclick="report()">Submit Report</button>

```

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map;
let markers = [];

// 🗺 INIT MAP
function initMap() {
    map = L.map('map').setView([9.0820, 8.6753], 6); // Nigeria center

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);
}

// 📡 LOAD INCIDENTS
async function loadIncidents() {
    try {
        const res = await fetch('/incidents');
        const data = await res.json();

        const list = document.getElementById('incidents');
        list.innerHTML = "";

        // clear markers
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        data.slice(-10).reverse().forEach(i => {
            const li = document.createElement('li');
            li.textContent = `${i.location} - ${i.desc}`;
            list.appendChild(li);

            if (i.lat && i.lng) {
                const marker = L.marker([i.lat, i.lng]).addTo(map);
                marker.bindPopup(i.desc);
                markers.push(marker);
            }
        });

    } catch (err) {
        console.log("Error loading incidents");
    }
}

// 🧠 LOAD RISK
async function loadRisk() {
    try {
        const res = await fetch('/risk');
        const data = await res.json();

        const el = document.getElementById('riskLevel');
        el.textContent = "Risk Level: " + data.risk;

        if (data.risk === "HIGH") {
            el.style.color = "red";
            showAlert("🚨 HIGH RISK AREA DETECTED");
        } else if (data.risk === "MEDIUM") {
            el.style.color = "orange";
        } else {
            el.style.color = "green";
        }

    } catch (err) {
        console.log("Risk load error");
    }
}

// 📰 LOAD REPORTS
async function loadReports() {
    try {
        const res = await fetch('/reports');
        const data = await res.json();

        const list = document.getElementById('reports');
        list.innerHTML = "";

        data.slice(-5).reverse().forEach(r => {
            const li = document.createElement('li');
            li.textContent = r;
            list.appendChild(li);
        });

    } catch (err) {}
}

// 🚨 ALERT BANNER
function showAlert(msg) {
    const banner = document.getElementById('alertBanner');
    banner.textContent = msg;
    banner.style.display = "block";

    setTimeout(() => {
        banner.style.display = "none";
    }, 5000);
}

// 📍 REPORT INCIDENT
async function report() {
    const location = document.getElementById('location').value;
    const desc = document.getElementById('desc').value;

    if (!location || !desc) return alert("Fill all fields");

    await fetch('/report', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ location, desc })
    });

    document.getElementById('location').value = "";
    document.getElementById('desc').value = "";

    loadIncidents();
}

// 🔄 AUTO REFRESH
setInterval(() => {
    loadIncidents();
    loadRisk();
    loadReports();
}, 10000);

// 🚀 START
initMap();
loadIncidents();
loadRisk();
loadReports();
</script>

</body>
