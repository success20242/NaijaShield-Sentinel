<body>

<header>
    <h2>🛡️ NaijaShield Sentinel Command Center</h2>
    <p class="risk" id="riskLevel">Loading risk...</p>
</header>

<div id="alertBanner"></div>
<div id="map"></div>

<div class="container">

```
<div class="grid">

    <div>
        <h3>📍 Report Incident</h3>
        <input id="location" placeholder="Location">
        <textarea id="desc" placeholder="Describe incident"></textarea>
        <button onclick="report()">Submit Report</button>
    </div>

    <div>
        <h3>📡 Live Incidents</h3>
        <ul id="incidents"></ul>
    </div>

</div>

<h3>🧠 Live Intelligence Feed</h3>
<div id="feed"></div>

<h3>📰 Daily Reports</h3>
<ul id="reports"></ul>
```

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
let map;
let clusterGroup;
let heatLayer;

const socket = io("http://localhost:3000");

// 🗺 INIT MAP
function initMap() {
    map = L.map('map').setView([9.0820, 8.6753], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    clusterGroup = L.markerClusterGroup();
    map.addLayer(clusterGroup);

    heatLayer = L.heatLayer([], { radius: 25 }).addTo(map);
}

// 🚨 ALERT
function showAlert(msg) {
    const banner = document.getElementById('alertBanner');
    banner.textContent = msg;
    banner.style.display = "block";

    setTimeout(() => banner.style.display = "none", 4000);
}

// 📍 REPORT INCIDENT
async function report() {
    const location = document.getElementById('location').value;
    const desc = document.getElementById('desc').value;

    if (!location || !desc) return alert("Fill all fields");

    await fetch('/report', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ location, description: desc })
    });

    document.getElementById('location').value = "";
    document.getElementById('desc').value = "";
}

// 🔴 INCIDENT STREAM
socket.on("incident", (i) => {
    const list = document.getElementById('incidents');

    const li = document.createElement('li');
    li.textContent = `${i.location} - ${i.description}`;
    list.prepend(li);
});

// 🧠 INTELLIGENCE STREAM (MAIN FIX)
socket.on("intel_update", (data) => {
    console.log("📡 Intel:", data);

    updateDashboard(data.alerts);
});

// 📊 UPDATE DASHBOARD
function updateDashboard(alerts) {

    const feed = document.getElementById("feed");
    clusterGroup.clearLayers();

    let heatPoints = [];

    feed.innerHTML = alerts.map(a => {

        if (a.lat && a.lng) {
            const marker = L.marker([a.lat, a.lng]);
            clusterGroup.addLayer(marker);
            heatPoints.push([a.lat, a.lng, 0.5]);
        }

        return `
        <div class="alert">
            <h4>${a.title}</h4>
            <p>${a.location}</p>
            <small>Threat: ${a.threatScore}</small>
        </div>`;
    }).join("");

    heatLayer.setLatLngs(heatPoints);
}

// 🧠 RISK
socket.on("risk", (data) => {
    const el = document.getElementById('riskLevel');
    el.textContent = "Risk Level: " + data.risk;

    if (data.risk === "HIGH") {
        el.style.color = "red";
        showAlert("🚨 HIGH RISK DETECTED");
    } else if (data.risk === "MEDIUM") {
        el.style.color = "orange";
    } else {
        el.style.color = "green";
    }
});

// 📰 REPORT
socket.on("report", (r) => {
    const list = document.getElementById('reports');

    const li = document.createElement('li');
    li.textContent = `📅 ${r.date} | Total: ${r.total}`;

    list.prepend(li);
});

initMap();
</script>

</body>
</html>
